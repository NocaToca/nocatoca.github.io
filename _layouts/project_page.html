<!DOCTYPE html>
<html lang="en">
  <head>
    <link href="https://fonts.googleapis.com/css2?family=Tangerine:wght@400;500;600&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <link rel="stylesheet" href="/css/post.css">
  </head>
  <body>
    
    <header class="shader-banner">
        <canvas id="post-banner-canvas"></canvas>
        <div class="banner-title-box">
            <h1>{{ page.title }}</h1>
        </div>
    </header>

    <main class="posts">
      <div class="post-content">
        {{ content }}
      </div>
    </main>

    </body>
    <script>

      document.addEventListener('DOMContentLoaded', () => {
    const rows = document.querySelectorAll('.togglable-row');

    rows.forEach(row => {
        const buttons = row.querySelectorAll('.toggle-btn');
        const designView = row.querySelector('.design-view');
        const techView = row.querySelector('.technical-view');

        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                // 1. Update button classes
                buttons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                // 2. Toggle visibility
                const target = btn.getAttribute('data-target');
                if (target === 'technical') {
                    designView.style.display = 'none';
                    techView.style.display = 'block';
                } else {
                    designView.style.display = 'block';
                    techView.style.display = 'none';
                }
            });
        });
    });
});
    </script>
</html>
